apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: solr
spec:
  template:
    spec:
      containers:
      - name: solr
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
spec:
  template:
    spec:
      containers:
      - name: zookeeper
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

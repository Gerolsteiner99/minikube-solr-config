apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: solr
  labels:
    app.kubernetes.io/name: solr
    app.kubernetes.io/instance: solr
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 9.4.1
    helm.sh/chart: solr-1.0.0
spec:
  serviceName: solr-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: solr
      app.kubernetes.io/instance: solr
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: solr
        app.kubernetes.io/instance: solr
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/version: 9.4.1
        helm.sh/chart: solr-1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8983"
    spec:
      serviceAccountName: solr
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: ["solr"]
      initContainers:
        - name: init-chmod
          image: busybox:1.35
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              chown -R 8983:8983 /var/solr
              chmod 755 /var/solr
              echo "Permissions fixed for Solr data directory"
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: solr-data
              mountPath: /var/solr
        - name: wait-for-zookeeper
          image: busybox:1.35
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nslookup zookeeper-headless; do
                echo "Waiting for ZooKeeper DNS..."
                sleep 2
              done
              echo "ZooKeeper DNS resolved"
      containers:
        - name: solr
          image: docker.io/library/solr:9.4.1
          imagePullPolicy: IfNotPresent
          command:
            - docker-entrypoint.sh
          args:
            - solr
            - start
            - -f
            - -c
            - -z
            - $(ZK_HOST)
            - -h
            - $(SOLR_HOST)
            - -p
            - "8983"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SOLR_HOST
              value: $(POD_NAME).solr-headless.$(NAMESPACE).svc.cluster.local
            - name: SOLR_PORT
              value: "8983"
            - name: ZK_HOST
              value: zookeeper-headless:2181/solr
            - name: SOLR_JAVA_MEM
              value: -Xms1g -Xmx2g
            - name: GC_TUNE
              value: -XX:+UseG1GC -XX:+PerfDisableSharedMem -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=250 -XX:+UseLargePages -XX:+AlwaysPreTouch
            - name: SOLR_OPTS
              value: -Djetty.host=0.0.0.0 -Djetty.port=8983 -DzkClientTimeout=30000 -Dlog4j2.formatMsgNoLookups=true
            - name: SOLR_HEAP
              value: 2g
          ports:
            - name: http
              containerPort: 8983
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /solr/admin/info/system
              port: 8983
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /solr/admin/info/system
              port: 8983
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /solr
              port: 8983
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: solr-data
              mountPath: /var/solr
  volumeClaimTemplates:
    - metadata:
        name: solr-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: standard
        volumeMode: Filesystem


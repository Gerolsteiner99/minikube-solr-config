# Source: zookeeper/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: zookeeper-config
  labels:
    helm.sh/chart: zookeeper-1.0.0
    app.kubernetes.io/name: zookeeper
    app.kubernetes.io/instance: zookeeper
    app.kubernetes.io/version: "3.9.4"
    app.kubernetes.io/managed-by: Helm
data:
  zoo.cfg: |
    tickTime=2000
    initLimit=10
    syncLimit=5
    dataDir=/data
    dataLogDir=/datalog
    maxClientCnxns=60
    standaloneEnabled=false
    admin.enableServer=false
    clientPort=2181
    quorumListenOnAllIPs=true
    4lw.commands.whitelist=*
    server.1=zookeeper-0.zookeeper-headless:2888:3888
    server.2=zookeeper-1.zookeeper-headless:2888:3888
    server.3=zookeeper-2.zookeeper-headless:2888:3888
